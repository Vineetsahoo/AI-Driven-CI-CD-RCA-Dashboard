apiVersion: apps/v1
kind: Deployment
metadata:
  name: moraai-platform
  namespace: moraai
  labels:
    app: moraai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: moraai-platform
  template:
    metadata:
      labels:
        app: moraai-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: moraai-platform
          image: 982081089142.dkr.ecr.us-east-1.amazonaws.com/moraai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: OLLAMA_ENABLED
              value: "false"
            - name: OLLAMA_URL
              value: "http://ollama.ollama.svc.cluster.local:11434"
            - name: OLLAMA_MODEL
              value: "llama3.2"
            - name: BEDROCK_MODEL_ID
              value: "amazon.nova-lite-v1:0"
            - name: RCA_API_URL
              valueFrom:
                secretKeyRef:
                  name: moraai-rca-secrets
                  key: rca_api_url
                  optional: true
            - name: BEDROCK_RUNTIME_ROLE_ARN
              valueFrom:
                secretKeyRef:
                  name: moraai-rca-secrets
                  key: bedrock_runtime_role_arn
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
