name: CD to EKS

on:
  workflow_dispatch:
    inputs:
      aws_role_to_assume:
        description: IAM role ARN for GitHub OIDC authentication
        required: true
        type: string
      aws_region:
        description: AWS region
        required: false
        default: us-east-1
        type: string
      ecr_repository:
        description: ECR repository name
        required: false
        default: moraai
        type: string
      eks_cluster_name:
        description: EKS cluster name
        required: true
        type: string
      k8s_namespace:
        description: Kubernetes namespace
        required: false
        default: moraai
        type: string
      k8s_deployment:
        description: Kubernetes deployment name
        required: false
        default: moraai-platform
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: false

env:
  AWS_REGION: ${{ github.event.inputs.aws_region }}
  ECR_REPOSITORY: ${{ github.event.inputs.ecr_repository }}
  K8S_NAMESPACE: ${{ github.event.inputs.k8s_namespace }}
  K8S_DEPLOYMENT: ${{ github.event.inputs.k8s_deployment }}
  CONTAINER_NAME: moraai-platform

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.aws_role_to_assume }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.aws_role_to_assume }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "${{ github.event.inputs.eks_cluster_name }}"

      - name: Apply manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/deployment.yaml
          kubectl apply -f infra/k8s/service.yaml
          kubectl apply -f infra/k8s/hpa.yaml

      - name: Update deployment image
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/"$K8S_DEPLOYMENT" "$CONTAINER_NAME"="${{ needs.build-and-push.outputs.image_uri }}"
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$K8S_DEPLOYMENT" --timeout=600s
